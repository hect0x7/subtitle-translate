<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube 双语字幕</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup-container">
    <!-- 头部 -->
    <div class="popup-header">
      <div class="popup-logo">
        <img src="icons/icon48.png" alt="icon" class="popup-icon">
        <div>
          <h1>双语字幕</h1>
          <p class="popup-subtitle">YouTube Bilingual Subs</p>
        </div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="toggle-enabled" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>

    <!-- 状态 -->
    <div class="status-bar" id="status-bar">
      <span class="status-dot active"></span>
      <span class="status-text">已启用</span>
    </div>

    <!-- 设置 -->
    <div class="settings-section">
      <div class="setting-group">
        <label class="setting-label">字幕大小</label>
        <div class="btn-group" id="font-size-group">
          <button data-value="small" class="btn-option">小</button>
          <button data-value="medium" class="btn-option active">中</button>
          <button data-value="large" class="btn-option">大</button>
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">显示风格</label>
        <div class="btn-group" id="style-group">
          <button data-value="immersive" class="btn-option active">沉浸式</button>
          <button data-value="classic" class="btn-option">经典</button>
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">译文颜色</label>
        <div class="color-picker-row">
          <div class="color-presets" id="color-presets">
            <button class="color-swatch active" data-color="#ffffff" style="background:#ffffff" title="白色"></button>
            <button class="color-swatch" data-color="#ffd700" style="background:#ffd700" title="金色"></button>
            <button class="color-swatch" data-color="#7dd3fc" style="background:#7dd3fc" title="天蓝"></button>
            <button class="color-swatch" data-color="#4ade80" style="background:#4ade80" title="绿色"></button>
            <button class="color-swatch" data-color="#f472b6" style="background:#f472b6" title="粉色"></button>
            <button class="color-swatch" data-color="#fbbf24" style="background:#fbbf24" title="橙黄"></button>
          </div>
          <input type="color" id="custom-color" value="#ffffff" title="自定义颜色">
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">背景不透明度 <span id="opacity-value" class="setting-value">78%</span></label>
        <input type="range" id="bg-opacity" min="0" max="100" value="78" class="range-slider">
      </div>

      <div class="setting-group">
        <label class="setting-label">译文字体</label>
        <select id="trans-font-family" class="setting-select">
          <option value="">默认（跟随系统）</option>
          <option value="'Noto Sans SC', sans-serif">Noto Sans SC</option>
          <option value="'Microsoft YaHei', sans-serif">微软雅黑</option>
          <option value="'PingFang SC', sans-serif">苹方</option>
          <option value="'Source Han Sans SC', sans-serif">思源黑体</option>
          <option value="'SimSun', serif">宋体</option>
          <option value="'KaiTi', serif">楷体</option>
        </select>
      </div>

      <div class="setting-group">
        <label class="setting-label">译文字号 <span id="trans-size-value" class="setting-value">跟随预设</span></label>
        <input type="range" id="trans-font-size" min="0" max="40" value="0" class="range-slider">
      </div>

      <div class="setting-group">
        <label class="setting-label">译文字重</label>
        <div class="btn-group" id="font-weight-group">
          <button data-value="300" class="btn-option">细</button>
          <button data-value="400" class="btn-option active">常规</button>
          <button data-value="500" class="btn-option">中</button>
          <button data-value="700" class="btn-option">粗</button>
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">源语言 → 目标语言</label>
        <div class="lang-selector">
          <select id="source-lang">
            <option value="en" selected>English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
            <option value="auto">自动检测</option>
          </select>
          <span class="lang-arrow">→</span>
          <select id="target-lang">
            <option value="zh-CN" selected>简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 底部提示 -->
    <div class="popup-footer">
      <p>💡 请先在 YouTube 视频中开启英文字幕(CC)</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
